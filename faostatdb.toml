# FAOSTATdb default configuration (committed; the general shape everyone gets).
#
# Do NOT edit this file for machine-specific or personal settings. Instead put
# overrides in a git-ignored `secrets.env` (KEY=value per line); they take
# precedence over the values here. See the README "Configuration" section.

[build]
database = "faostat.duckdb"             # filename; final DB is written under $FABIO_DUCKDB_DIR
                                        #   override: FAOSTATDB_DATABASE
download_dir = "faostat_temp_download"  # temporary raw ZIPs, project-local, deleted after build
                                        #   override: FAOSTATDB_DOWNLOAD_DIR
keep_archives = false                   # override: FAOSTATDB_KEEP_ARCHIVES
jobs = 6                                # override: FAOSTATDB_JOBS
overwrite = false                       # override: FAOSTATDB_OVERWRITE

[datasets]
mode = "all"                            # all | include | exclude; override: FAOSTATDB_DATASETS_MODE
include = []                            # override: FAOSTATDB_DATASETS_INCLUDE (comma-separated)
exclude = ["FA", "CBH"]                 # override: FAOSTATDB_DATASETS_EXCLUDE (comma-separated)
