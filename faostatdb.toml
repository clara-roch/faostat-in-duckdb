# FAOSTATdb example / default configuration.
#
# This file is the package's example configuration, kept in the repository for
# development. End users do NOT edit this file. Instead run `faostatdb config
# init` in the directory you launch faostatdb from to write a faostatdb.toml
# there, then edit that copy. It uses exactly this schema.
#
# Precedence (lowest first): built-in defaults < ./faostatdb.toml < CLI flags.

[build]
database = "faostat.duckdb"             # filename; final DB written project-local (cwd) by default
                                        #   (set FAOSTATDB_DATABASE_DIR to redirect a bare filename to another dir)
download_dir = "faostat_temp_download"  # where raw ZIPs are cached, project-local
keep_archives = false                   # delete cached .zip after a successful build
                                        #   (hot restart still reuses them after a
                                        #   failure); set true for fast iteration.
jobs = 0                                # parallel downloads; 0 = auto min(8, 2*cpu)
overwrite = false                       # true wipes the DB before building
compact = true                          # rewrite the finished DB to reclaim space
keep_raw_tables = false                 # keep untouched raw_<code> copies (debug)
years = ""                              # "" = all years; else keep only these, e.g.
                                        #   "2010", "2000,2005,2010" or "1990-1995,2020".
                                        #   Whole archive still downloaded; non-matching
                                        #   rows dropped at import (--years overrides).

[datasets]
mode = "all"                            # all | include | exclude
include = []
exclude = ["FA", "CBH"]

[performance]
import_threads = 0                      # DuckDB import threads; 0 = DuckDB default
memory_limit = ""                       # e.g. "8GB"; "" = DuckDB default

[enrichment]
area_classification = true              # add (non-source) area country/region flags
                                        #   set false / --no-enrich-areas to skip.
historical_validity = true              # fill valid_from/valid_to for former areas
                                        #   (USSR, Sudan (former), …) from a curated
                                        #   gazetteer; implies area_classification.
                                        #   set false / --no-enrich-history to skip.
